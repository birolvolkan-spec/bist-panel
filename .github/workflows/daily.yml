name: Volkan Daily Radar

on:
  push:
    branches: ["main"]
    paths:
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/daily.yml"
      - "index.html"
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: volkan-daily-radar
  cancel-in-progress: true

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build daily report
        run: python scripts/build_report.py

      - name: Add coin direction timeframe recommendations
        run: python scripts/add_recommendations.py

      - name: Commit updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_report.json
          git diff --cached --quiet || git commit -m "Update daily market report"
          git push
