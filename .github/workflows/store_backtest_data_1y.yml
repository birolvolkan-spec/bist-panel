name: Store 1Y Futures Backtest Data In GitHub

on:
  workflow_dispatch:
    inputs:
      days:
        description: "How many days to fetch"
        required: true
        default: "365"
      interval:
        description: "Binance kline interval"
        required: true
        default: "1m"
      symbols:
        description: "Comma separated symbols"
        required: true
        default: "BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT,DOGEUSDT,AVAXUSDT,LINKUSDT,DOTUSDT,LTCUSDT,ARBUSDT,OPUSDT,NEARUSDT,APTUSDT"
      start:
        description: "Optional UTC start date YYYY-MM-DD. Leave empty to use days."
        required: false
        default: ""
      end:
        description: "Optional UTC end date YYYY-MM-DD exclusive. Leave empty for current UTC midnight."
        required: false
        default: ""
      target_branch:
        description: "Branch where data will be stored"
        required: true
        default: "backtest-data"
  push:
    branches: ["main"]
    paths:
      - "scripts/build_backtest_pool_monthly.py"
      - ".github/workflows/store_backtest_data_1y.yml"

permissions:
  contents: write

concurrency:
  group: store-backtest-data
  cancel-in-progress: false

jobs:
  store-backtest-data:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Resolve inputs
        id: vars
        run: |
          DAYS="${{ github.event.inputs.days }}"
          INTERVAL="${{ github.event.inputs.interval }}"
          SYMBOLS="${{ github.event.inputs.symbols }}"
          START_DATE="${{ github.event.inputs.start }}"
          END_DATE="${{ github.event.inputs.end }}"
          TARGET_BRANCH="${{ github.event.inputs.target_branch }}"
          echo "days=${DAYS:-365}" >> "$GITHUB_OUTPUT"
          echo "interval=${INTERVAL:-1m}" >> "$GITHUB_OUTPUT"
          echo "symbols=${SYMBOLS:-BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT,DOGEUSDT,AVAXUSDT,LINKUSDT,DOTUSDT,LTCUSDT,ARBUSDT,OPUSDT,NEARUSDT,APTUSDT}" >> "$GITHUB_OUTPUT"
          echo "start=${START_DATE}" >> "$GITHUB_OUTPUT"
          echo "end=${END_DATE}" >> "$GITHUB_OUTPUT"
          echo "target_branch=${TARGET_BRANCH:-backtest-data}" >> "$GITHUB_OUTPUT"

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests==2.32.4

      - name: Build monthly compressed CSV data pool outside repo
        run: |
          rm -rf /tmp/volkan_backtest_data
          python scripts/build_backtest_pool_monthly.py \
            --out /tmp/volkan_backtest_data \
            --days "${{ steps.vars.outputs.days }}" \
            --interval "${{ steps.vars.outputs.interval }}" \
            --symbols "${{ steps.vars.outputs.symbols }}" \
            --start "${{ steps.vars.outputs.start }}" \
            --end "${{ steps.vars.outputs.end }}"

      - name: Switch to data branch
        run: |
          BRANCH="${{ steps.vars.outputs.target_branch }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git checkout "$BRANCH"
            git pull origin "$BRANCH" --ff-only || true
          else
            git checkout --orphan "$BRANCH"
            git rm -rf . || true
          fi

      - name: Copy data into branch and commit
        run: |
          rsync -a --delete /tmp/volkan_backtest_data/ ./
          git add -A
          git status --short
          git diff --cached --quiet || git commit -m "Store 1Y compressed futures backtest data"
          git push origin "${{ steps.vars.outputs.target_branch }}"
