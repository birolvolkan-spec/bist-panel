name: Build 1Y Futures Backtest Pool

on:
  workflow_dispatch:
    inputs:
      days:
        description: "How many days to fetch"
        required: true
        default: "365"
      interval:
        description: "Binance kline interval"
        required: true
        default: "1m"
      symbols:
        description: "Comma separated symbols"
        required: true
        default: "BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT,DOGEUSDT,AVAXUSDT,LINKUSDT,DOTUSDT,LTCUSDT,ARBUSDT,OPUSDT,NEARUSDT,APTUSDT"
      start:
        description: "Optional UTC start date YYYY-MM-DD. Leave empty to use days."
        required: false
        default: ""
      end:
        description: "Optional UTC end date YYYY-MM-DD exclusive. Leave empty for current UTC midnight."
        required: false
        default: ""

permissions:
  contents: read
  actions: write

jobs:
  build-backtest-pool:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests==2.32.4

      - name: Build futures backtest data pool
        run: |
          python scripts/build_backtest_pool_1y.py \
            --days "${{ github.event.inputs.days }}" \
            --interval "${{ github.event.inputs.interval }}" \
            --symbols "${{ github.event.inputs.symbols }}" \
            --start "${{ github.event.inputs.start }}" \
            --end "${{ github.event.inputs.end }}"

      - name: Upload CSV folder artifact
        uses: actions/upload-artifact@v4
        with:
          name: volkan-futures-backtest-pool-csv
          path: backtest_pool_output/**
          retention-days: 7
          compression-level: 6
